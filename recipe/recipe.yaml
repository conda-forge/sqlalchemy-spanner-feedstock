schema_version: 1

context:
  name: sqlalchemy-spanner
  version: "1.18.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sqlalchemy_spanner-${{ version }}.tar.gz
  sha256: faabdf74797399e1c4d60500fd55012b1d21a5a697ebafc3d5156d0f2d3b3993

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - sqlalchemy >=1.1.13
    - google-cloud-spanner >=3.55.0
    - alembic

tests:
  - python:
      imports:
        - google.cloud.sqlalchemy_spanner
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check

about:
  summary: SQLAlchemy dialect integrated into Cloud Spanner database
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/sqlalchemy-spanner

extra:
  recipe-maintainers:
    - xylar
